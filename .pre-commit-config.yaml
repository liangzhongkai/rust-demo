fail_fast: false
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-byte-order-marker
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
  - repo: https://github.com/psf/black
    rev: 22.10.0
    hooks:
      - id: black
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Check rustfmt for the whole workspace (matches `cargo fmt`).
        entry: bash -c 'cargo fmt --all -- --check'
        language: rust
        pass_filenames: false
        files: \.rs$
      - id: cargo-deny
        name: cargo deny check
        description: Policy check on dependencies (requires cargo-deny + deny.toml).
        entry: bash -c 'cargo deny check'
        language: rust
        pass_filenames: false
        files: ^(Cargo\.(toml|lock)|deny\.toml|crates/.*/Cargo\.toml)$
      - id: typos
        name: typos
        description: Spell check (uses _typos.toml).
        entry: bash -c 'typos'
        language: rust
        pass_filenames: false
        files: \.(rs|md|toml|txt)$
      - id: cargo-check
        name: cargo check
        description: Check the workspace for errors.
        entry: bash -c 'cargo check --all'
        language: rust
        files: \.rs$
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        description: Lint Rust sources (warnings allowed).
        entry: bash -c 'cargo clippy --all-targets --all-features --tests --benches'
        language: rust
        files: \.rs$
        pass_filenames: false
      - id: cargo-test
        name: cargo nextest
        description: Run workspace tests (requires cargo-nextest).
        entry: bash -c 'cargo nextest run --workspace --all-features'
        language: rust
        files: \.rs$
        pass_filenames: false
